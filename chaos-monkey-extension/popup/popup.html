<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChaosMonkey Tester</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>ChaosMonkey Tester</h1>

    <section class="config">
      <h2>Configuration</h2>

      <div class="field">
        <label for="duration">Duration (seconds)</label>
        <input type="number" id="duration" min="1" value="30">
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="primary">Start Chaos</button>
      <button id="stopBtn" class="secondary">Stop Chaos</button>
    </section>

    <section class="export">
      <h2>Export Logs</h2>
      <div class="export-buttons">
        <button id="exportJsonBtn">Export JSON</button>
      </div>
    </section>

    <section class="stats">
      <h2>Live Stats</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="label">Total</span>
          <span id="totalActions" class="value">0</span>
        </div>
        <div class="stat-item">
          <span class="label">Clicks</span>
          <span id="clicks" class="value">0</span>
        </div>
        <div class="stat-item">
          <span class="label">Inputs</span>
          <span id="inputs" class="value">0</span>
        </div>
        <div class="stat-item">
          <span class="label">Scrolls</span>
          <span id="scrolls" class="value">0</span>
        </div>
        <div class="stat-item">
          <span class="label">DOM Changes</span>
          <span id="domChanges" class="value">0</span>
        </div>
        <div class="stat-item">
          <span class="label">Errors</span>
          <span id="errors" class="value">0</span>
        </div>
      </div>
      <div id="status" class="status">Idle</div>
    </section>

    <section class="logs">
      <h2>Recent Activity</h2>
      <pre id="logTail" class="log-tail"></pre>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
